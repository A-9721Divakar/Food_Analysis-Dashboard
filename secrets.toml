# HOW TO USE THIS FILE
# ─────────────────────────────────────────────────────────────────────────────
#
# FOR LOCAL DEVELOPMENT:
#   1. Create the folder:  .streamlit/   (in the same directory as food_dashboard.py)
#   2. Copy this file to:  .streamlit/secrets.toml
#   3. Fill in your actual credentials below.
#   4. Run:  streamlit run food_dashboard.py
#
# FOR STREAMLIT CLOUD DEPLOYMENT:
#   1. Go to your app on share.streamlit.io
#   2. Click  ⋮  →  Settings  →  Secrets
#   3. Paste the contents below (with your real values) into the text box.
#   4. Click Save — the app will reboot automatically.
#
